services:

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "1000:8000"
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    depends_on:
      - db
    networks:
      - mynetwork

  db:
    image: postgres
    ports:
      - "2000:5432"
    volumes:
      - ./app/postgresql:/var/lib/postgresql
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres

    networks:
      - mynetwork

networks:
  mynetwork:
